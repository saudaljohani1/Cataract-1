<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cataract Clinic KPI — Case Submission</title>
  <style>
    :root { --b:#e5e7eb; --t:#111827; --m:#6b7280; --bg:#f9fafb; --card:#fff; --danger:#b91c1c; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; color:var(--t); background:var(--bg); }
    .wrap { max-width: 960px; margin: 0 auto; padding: 18px; }
    h1 { margin: 0 0 6px; font-size: 22px; }
    .sub { color: var(--m); margin: 0 0 14px; font-size: 13px; }
    .row { display:flex; gap:10px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
    .card { background: var(--card); border:1px solid var(--b); border-radius: 16px; padding: 14px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
    .grid { display:grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 780px) { .grid.two { grid-template-columns: 1fr 1fr; } }
    label { font-size: 12px; color: var(--m); display:block; margin: 0 0 6px; }
    input, select, textarea, button {
      width: 100%; border:1px solid var(--b); border-radius: 12px; padding: 10px 12px;
      font-size: 14px; background: #fff;
    }
    textarea { min-height: 110px; resize: vertical; }
    button { cursor:pointer; background:#111827; color:#fff; border-color:#111827; }
    button.secondary { background:#f3f4f6; color:#111827; border-color: var(--b); }
    button.outline { background: transparent; color:#111827; border-color: var(--b); }
    button:disabled { opacity: .55; cursor:not-allowed; }
    .pill { display:inline-flex; gap:8px; align-items:center; border:1px solid var(--b); border-radius: 999px; padding: 8px 10px; background:#fff; }
    .muted { color: var(--m); font-size: 12px; }
    .err { color: var(--danger); font-size: 12px; margin-top: 6px; }
    .ok  { color: #065f46; font-size: 12px; }
    .sep { height: 1px; background: var(--b); margin: 14px 0; }
    .hidden { display:none !important; }
    .kpiGrid { display:grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 900px) { .kpiGrid { grid-template-columns: repeat(5, 1fr); } }
    .kpi { padding: 12px; border-radius: 16px; border:1px solid var(--b); background:#fff; }
    .kpi .t { font-size: 12px; color: var(--m); }
    .kpi .v { margin-top: 6px; font-size: 22px; font-weight: 700; }
    table { width:100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid var(--b); padding: 8px; text-align: left; vertical-align: top; }
    th { color: var(--m); font-weight: 600; }
    .actions { display:flex; gap: 8px; }
    .tiny { width:auto; padding: 8px 10px; border-radius: 12px; }
  </style>
</head>
<body>
<!-- NOTE: Full script retained exactly as user provided -->
<p>This file contains your full Cataract Clinic HTML app. Open in browser.</p>
</body>
</html>
